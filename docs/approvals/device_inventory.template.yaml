# Device inventory template.
# Store raw local inventory in ignored files under .qa_local/devices/.
# Public docs may use only aliases and non-sensitive category data.

schema_version: task-016-device-inventory-draft-1
owner: project_owner
sensitive_identifiers_forbidden:
  - serial
  - ip_address
  - imei
  - mac
  - android_id
  - google_account
  - full_build_fingerprint
  - phone_number
  - otp
  - owner_name
  - room_or_location_label
  - personal_device_identifier

devices:
  - device_alias: tv-tcl-001
    runtime_profile_alias: tv-tcl-a11-001
    priority: P0
    category: android_tv
    android_major: 11
    api_level: 30
    form_factor: tv
    input_method: dpad_remote
    screen_class: "HD/FHD/4K/unknown"
    google_play_services: "yes/no/unknown"
    adb_available: "yes/no/unknown"
    classification_confidence: "heuristic/manual_confirmed/unknown"
    manual_review_required: true
    forbidden_identifiers_excluded: true
    runtime_execution_status: not_run
    apk_install_status: not_run
    app_launch_status: not_run

  - device_alias: stb-xiaomi-001
    runtime_profile_alias: stb-xiaomi-a12-001
    priority: P0
    category: android_stb
    android_major: 12
    api_level: 31
    form_factor: stb
    input_method: dpad_remote
    screen_class: "HD/FHD/4K/unknown"
    google_play_services: "yes/no/unknown"
    adb_available: "yes/no/unknown"
    classification_confidence: "heuristic/manual_confirmed/unknown"
    manual_review_required: true
    forbidden_identifiers_excluded: true
    runtime_execution_status: not_run
    apk_install_status: not_run
    app_launch_status: not_run

  - device_alias: phone-samsung-001
    runtime_profile_alias: phone-samsung-a14-001
    priority: P2
    category: android_phone_secondary
    android_major: 14
    api_level: 34
    form_factor: phone
    input_method: touch
    screen_class: mobile
    google_play_services: "yes/no/unknown"
    adb_available: "yes/no/unknown"
    classification_confidence: "heuristic/manual_confirmed/unknown"
    manual_review_required: true
    forbidden_identifiers_excluded: true
    runtime_execution_status: not_run
    apk_install_status: not_run
    app_launch_status: not_run
    notes: "Phone does not replace Android TV or D-pad QA."
